/* ---------- scroll reveal wrapper ---------- */
const Reveal = ({ children, delay=0, className="" }) => {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
    }, { threshold: 0.12 });
    if (el) io.observe(el);
    return () => io.disconnect();
  }, []);
  return <div ref={ref} className={`reveal ${className}`} style={ { animationDelay: `${delay}ms` } }>{children}</div>;
};

const Button = ({ children, variant="primary", href="#", className="", ...rest }) => {
  const base = "inline-flex items-center justify-center gap-2 rounded-xl font-semibold transition-all duration-200 px-6 py-3.5 text-sm";
  const styles = {
    primary: "grad-cta text-white shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40 hover:-translate-y-0.5 animate-shimmer",
    ghost: "glass text-white hover:bg-white/10 hover:-translate-y-0.5",
    soft: "bg-white/5 text-white border border-white/10 hover:bg-white/10",
  };
  return <a href={href} className={`${base} ${styles[variant]} ${className}`} {...rest}>{children}</a>;
};

            <button onClick={()=>setAnnual(true)} className={`px-5 py-2 rounded-full text-sm font-semibold transition ${annual?'grad-cta':'text-white/60'}`}>Annual <span className="text-mint">−20%</span></button>
          </div>
        </Reveal>
        <div className="mt-14 grid md:grid-cols-3 gap-6 items-start">
          {plans.map(([name,m,a,desc,feats,popular]) => (
            <Reveal key={name} delay={popular?60:0}>
              <div className={`relative rounded-3xl p-8 h-full ${popular ? 'grad-cta p-[1.5px]' : 'glass'}`}>
                <div className={`${popular ? 'rounded-[22px] bg-panel p-8 h-full' : ''}`}>
                  {popular && <span className="absolute -top-3 left-1/2 -translate-x-1/2 grad-cta text-xs font-bold px-4 py-1 rounded-full">MOST POPULAR</span>}
                  <h3 className="font-display font-bold text-xl">{name}</h3>
                  <p className="text-sm text-white/50 mt-1">{desc}</p>
                  <div className="mt-5 flex items-end gap-1">
                    <span className="font-display font-extrabold text-5xl">${annual?a:m}</span>
                    <span className="text-white/50 mb-2 text-sm">/mo</span>
                  </div>
                  <Button href="#" variant={popular?'primary':'soft'} className="w-full mt-6">{m===0?'Start free':'Get '+name}</Button>
                  <ul className="mt-7 space-y-3">
                    {feats.map(f => (
                      <li key={f} className="flex items-center gap-3 text-sm text-white/75">
                        <span className="flex-none grid place-items-center w-5 h-5 rounded-full bg-mint/20 text-mint"><Icon name="check" className="w-3.5 h-3.5"/></span>{f}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
};
